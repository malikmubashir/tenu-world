<!-- Tenu Mark 01 — Disc (primary).
     Figure carved from a Tenu Ink disc on Paper. Use this version
     wherever the brand needs a formal, seal-like presence: app
     icons, favicons, PDF headers, social share cards. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Tenu — Mark 01 Disc">
  <rect width="48" height="48" fill="#F4F1EA"/>
  <defs>
    <mask id="tenu-cut-disc">
      <rect width="48" height="48" fill="white"/>
      <circle cx="24" cy="13" r="4.9" fill="black"/>
      <rect x="11" y="22.4" width="26" height="2.2" rx="1.1" fill="black"/>
      <rect x="22.9" y="23.5" width="2.2" height="18" rx="1.1" fill="black"/>
    </mask>
  </defs>
  <circle cx="24" cy="24" r="22" fill="#0B1F3A" mask="url(#tenu-cut-disc)"/>
  <circle cx="24" cy="13" r="4" fill="#F4F1EA"/>
</svg>
