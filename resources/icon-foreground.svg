<!-- Android adaptive icon — foreground layer (1024×1024 with 25% safe-area
     inset per Material Design spec). The figure must sit inside the inner
     ~660px circle to survive any launcher mask shape (round, squircle,
     teardrop). Background layer = solid #000000 in icon-background.svg
     (Éditorial v2, 2026-06-10). Figure geometry unchanged. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Tenu">
  <rect width="1024" height="1024" fill="none"/>
  <!-- Figure scaled to fit inside the safe 660 inner circle.
       Original 48-canvas figure scaled by 13.75 = ~660px tall. -->
  <g transform="translate(182, 182) scale(13.75)">
    <!-- Head silhouette -->
    <circle cx="24" cy="13" r="4.9" fill="#ffffff"/>
    <!-- Arms -->
    <rect x="11" y="22.4" width="26" height="2.2" rx="1.1" fill="#ffffff"/>
    <!-- Body -->
    <rect x="22.9" y="23.5" width="2.2" height="18" rx="1.1" fill="#ffffff"/>
    <!-- Head overlay (slightly smaller, white) for contrast against black bg -->
    <circle cx="24" cy="13" r="4" fill="#ffffff"/>
  </g>
</svg>
