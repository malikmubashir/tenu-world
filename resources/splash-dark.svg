<!-- Dark-mode splash. Same composition, inverted palette.
     iOS + Android both pick this up automatically when the device is
     in dark mode at app launch. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732" role="img" aria-label="Tenu">
  <rect width="2732" height="2732" fill="#0B1F3A"/>

  <g transform="translate(1006, 956) scale(15)">
    <defs>
      <mask id="splash-cut-dark">
        <rect x="0" y="0" width="48" height="48" fill="white"/>
        <circle cx="24" cy="13" r="4.9" fill="black"/>
        <rect x="11" y="22.4" width="26" height="2.2" rx="1.1" fill="black"/>
        <rect x="22.9" y="23.5" width="2.2" height="18" rx="1.1" fill="black"/>
      </mask>
    </defs>
    <path d="M 4 46 V 24 A 20 20 0 0 1 44 24 V 46 Z" fill="#F4F1EA" mask="url(#splash-cut-dark)"/>
    <circle cx="24" cy="13" r="4" fill="#0B1F3A"/>
  </g>

  <text
    x="1366"
    y="2080"
    font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
    font-size="180"
    font-weight="500"
    text-anchor="middle"
    letter-spacing="-7.2"
    fill="#F4F1EA"
  >tenu</text>
</svg>
